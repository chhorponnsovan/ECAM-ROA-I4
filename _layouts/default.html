<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title }}</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- MathJax Configuration -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      }
    };
  </script>

  <!-- MathJax Library -->
  <script async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
  </script>

  <style>
    /* ── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #fafaf8;
      --surface:     #ffffff;
      --border:      #e2e0d8;
      --border-dark: #c8c4b8;
      --text:        #1a1917;
      --text-muted:  #6b6760;
      --accent:      #2563eb;
      --accent-light:#eff6ff;
      --code-bg:     #f4f3ef;
      --th-bg:       #f0efe9;
      --tr-alt:      #f9f8f5;
      --radius:      6px;
      --font-body:   'Source Serif 4', Georgia, serif;
      --font-ui:     'Inter', sans-serif;
      --font-mono:   'JetBrains Mono', 'Courier New', monospace;
    }

    html { font-size: 17px; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Page Layout ─────────────────────────────────────────────── */
    .page-wrapper {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
    }

    /* ── Headings ────────────────────────────────────────────────── */
    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-ui);
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
      margin-top: 2.2rem;
      margin-bottom: 0.75rem;
    }
    h1 { font-size: 2rem;   border-bottom: 2px solid var(--border); padding-bottom: 0.4rem; margin-top: 0; }
    h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    h3 { font-size: 1.2rem; }
    h4 { font-size: 1.05rem; }

    /* ── Paragraphs & Inline ─────────────────────────────────────── */
    p { margin-bottom: 1.1rem; }

    a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
    a:hover { opacity: 0.75; }

    strong { font-weight: 700; }
    em     { font-style: italic; }

    /* ── Lists ───────────────────────────────────────────────────── */
    ul, ol {
      margin: 0.5rem 0 1.1rem 1.8rem;
    }
    li { margin-bottom: 0.3rem; }
    li > ul, li > ol { margin-top: 0.25rem; margin-bottom: 0.25rem; }

    /* ── Tables ──────────────────────────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border-dark);
      border-radius: var(--radius);
      overflow: hidden;         /* clips rounded corners */
      margin: 1.5rem 0;
      font-family: var(--font-ui);
      font-size: 0.92rem;
    }

    thead th {
      background: var(--th-bg);
      font-weight: 600;
      text-align: left;
      padding: 0.65rem 1rem;
      border-bottom: 2px solid var(--border-dark);
      white-space: nowrap;
    }

    tbody tr:nth-child(even) { background: var(--tr-alt); }
    tbody tr:hover            { background: var(--accent-light); }

    td {
      padding: 0.55rem 1rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    tbody tr:last-child td { border-bottom: none; }

    /* ── Code ────────────────────────────────────────────────────── */
    code {
      font-family: var(--font-mono);
      font-size: 0.85em;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.15em 0.4em;
    }

    pre {
      background: #1e1e1e;
      color: #d4d4d4;
      border-radius: var(--radius);
      padding: 1.2rem 1.4rem;
      overflow-x: auto;
      margin: 1.2rem 0 1.5rem;
      font-size: 0.875rem;
      line-height: 1.6;
    }
    pre code {
      background: none;
      border: none;
      padding: 0;
      color: inherit;
      font-size: inherit;
    }

    /* ── Blockquote ──────────────────────────────────────────────── */
    blockquote {
      border-left: 4px solid var(--accent);
      background: var(--accent-light);
      margin: 1.2rem 0;
      padding: 0.8rem 1.2rem;
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text-muted);
      font-style: italic;
    }
    blockquote p:last-child { margin-bottom: 0; }

    /* ── Horizontal Rule ─────────────────────────────────────────── */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    /* ── Images ──────────────────────────────────────────────────── */
    img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: block;
      margin: 1.2rem auto;
    }

    /* ── MathJax display ─────────────────────────────────────────── */
    .MathJax { overflow-x: auto; }
    mjx-container[display="true"] { margin: 1.2rem 0 !important; }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 600px) {
      html { font-size: 15px; }
      .page-wrapper { padding: 1.5rem 1rem 4rem; }
      table { font-size: 0.82rem; }
      thead th, td { padding: 0.45rem 0.6rem; }
    }
  </style>
</head>

<body>
  <div class="page-wrapper">
    {{ content }}
  </div>
</body>
</html>
